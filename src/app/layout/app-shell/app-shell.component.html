<div class="app-shell">
  
  <!-- Top Toolbar (only in document editor) -->
  <mat-toolbar class="doc-toolbar" *ngIf="isDocumentEditor()">
    
    <div class="toolbar-left">
      <button mat-icon-button routerLink="/documents" matTooltip="Back to docs">
        <mat-icon>arrow_back</mat-icon>
      </button>
      
      <div class="doc-breadcrumb">
        <span class="workspace-name">Optima Workspace</span>
        <mat-icon>chevron_right</mat-icon>
        <span class="doc-name">{{currentDocTitle}}</span>
      </div>
    </div>

    <div class="toolbar-right">
      <button mat-raised-button color="primary" class="share-btn">
        <mat-icon>share</mat-icon>
        <span class="share-label">Share</span>
      </button>

      <button class="action-btn secondary" (click)="exportCurrentPagePdf()">
        <mat-icon>article</mat-icon>
        <span class="export-label">Export Page</span>
      </button>

      <button class="action-btn secondary" (click)="exportDocumentPdf()">
        <mat-icon>download</mat-icon>
        <span class="export-label">Export Doc</span>
      </button>
    </div>
    
  </mat-toolbar>

  <!-- Main Layout -->
  <div class="main-layout" [class.no-toolbar]="!isDocumentEditor()">
    
    <!-- Main Navigation Sidebar -->
    <aside class="sidebar-container"
           *ngIf="!isDocumentsList()"
           [class.collapsed]="!showMainSidebar">
      <app-main-sidebar class="main-sidebar"></app-main-sidebar>
    </aside>

    <!-- Content Area -->
    <div class="content-area">
      <router-outlet></router-outlet>
    </div>

  </div>

</div>
