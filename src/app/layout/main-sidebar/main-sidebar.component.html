<div class="main-sidebar">

  <!-- Brand -->
  <div class="sidebar-brand">
    <div class="brand-content">
      <div class="brand-mark">
        <mat-icon class="brand-icon">edit_note</mat-icon>
      </div>
      <div class="brand-text">
        <span class="brand-name">DocFlow</span>
        <span class="brand-tagline">Document workspace</span>
      </div>
    </div>
    <button class="notifications-btn" mat-icon-button matTooltip="Notifications">
      <mat-icon>notifications_none</mat-icon>
    </button>
  </div>

  <!-- Workspace -->
  <div class="workspace-section">
    <button class="workspace-btn">
      <span class="workspace-name">{{currentWorkspace}}</span>
      <mat-icon>expand_more</mat-icon>
    </button>
  </div>



  <!-- Navigation -->
  <nav class="sidebar-nav">



    <mat-divider></mat-divider>

    <!-- Folders -->
    <div class="nav-group">
      <div class="group-header">
        <span class="group-label">Folders</span>
        <button class="view-all-link" routerLink="/documents">View all</button>
      </div>

      <a class="nav-link"
         *ngFor="let folder of (folders$ | async)?.slice(0, 3)">
        <mat-icon>folder_open</mat-icon>
        <span>{{folder.name}}</span>
      </a>

      <a class="nav-link add-link" (click)="createNewFolder()">
        <mat-icon>add</mat-icon>
        <span>New folder</span>
      </a>
    </div>


  
  </nav>
</div>
