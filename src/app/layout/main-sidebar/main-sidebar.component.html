<div class="main-sidebar">
  <!-- Logo/Brand -->
  <div class="sidebar-brand">
    <h2 class="brand-name">
      <mat-icon>Description icon</mat-icon>
      DocFlow
    </h2>

    <button
      mat-icon-button
      class="notifications-btn"
      matTooltip="Notifications"
    >
      <mat-icon>notifications_none</mat-icon>
    </button>
  </div>

  <!-- Workspace Selector -->
  <div class="workspace-section">
    <button class="workspace-btn">
      <span class="workspace-name">{{ currentWorkspace }}</span>
      <mat-icon>expand_more</mat-icon>
    </button>
  </div>

  <!-- Quick Actions -->
  <div class="quick-actions">
    <button class="create-doc-btn" (click)="createNewDocument()">
      <mat-icon>add</mat-icon>
      <span>Create doc</span>
    </button>
  </div>

  <!-- Navigation -->
  <nav class="sidebar-nav">
    <mat-divider></mat-divider>

    <!-- Folders -->
    <div class="nav-group">
      <div class="group-header">
        <span class="group-label">Folders</span>
        <button class="view-all-link">View all</button>
      </div>
      <a class="nav-link">
        <mat-icon>folder_open</mat-icon>
        <span>My docs</span>
      </a>
      <a class="nav-link add-link">
        <mat-icon>add</mat-icon>
        <span>New folder</span>
      </a>
    </div>
  </nav>
</div>
