<div class="main-sidebar">

  <!-- Brand -->
  <div class="sidebar-brand">
    <div class="brand-content">
      <div class="brand-mark">
        <mat-icon class="brand-icon">edit_note</mat-icon>
      </div>
      <div class="brand-text">
        <span class="brand-name">DocsApp</span>
        <span class="brand-tagline">Document workspace</span>
      </div>
    </div>
    <button class="notifications-btn" mat-icon-button matTooltip="Notifications">
      <mat-icon>notifications_none</mat-icon>
    </button>
  </div>

  <!-- Workspace -->
  <div class="workspace-section">
    <button class="workspace-btn">
      <span class="workspace-name">{{currentWorkspace}}</span>
      <mat-icon>expand_more</mat-icon>
    </button>
  </div>

  <!-- Create Doc -->
  <div class="quick-actions">
    <button class="create-doc-btn" (click)="createNewDocument()">
      <mat-icon>add</mat-icon>
      <span>Create doc</span>
    </button>
  </div>

  <!-- Dashboard (replaces folder section) -->
  <app-dashboard class="dashboard-section"></app-dashboard>

</div>
