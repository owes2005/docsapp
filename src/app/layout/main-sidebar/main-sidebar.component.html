<div class="main-sidebar">

  <!-- Brand -->
  <div class="sidebar-brand">
    <div class="brand-content">
      <div class="brand-mark">
        <mat-icon class="brand-icon">edit_note</mat-icon>
      </div>
      <div class="brand-text">
        <span class="brand-name">DocsApp</span>
        <span class="brand-tagline">Document workspace</span>
      </div>
    </div>
    <button class="notifications-btn" mat-icon-button matTooltip="Notifications">
      <mat-icon>notifications_none</mat-icon>
    </button>
  </div>

  <!-- Workspace -->
  <div class="workspace-section">
    <button class="workspace-btn">
      <span class="workspace-name">{{currentWorkspace}}</span>
      <mat-icon>expand_more</mat-icon>
    </button>
  </div>

 

  <!-- Navigation -->
  <nav class="sidebar-nav">
    <ng-container *ngIf="!isDocumentsListRoute">

    <!-- Projects Section -->
    <div class="nav-section-label">Projects</div>
    <button class="back-projects-btn" *ngIf="activeProjectId" (click)="backToAllProjects()">
      <mat-icon>arrow_back</mat-icon>
      Back to all projects
    </button>

    <div class="project-tree">

      <div class="project-item" *ngFor="let project of visibleProjects">

        <!-- Project Row -->
        <div class="project-row" [class.active]="isProjectActive(project.id)">

          <button class="chevron-btn" (click)="toggleProject(project.id)">
            <mat-icon class="chevron-icon" [class.open]="isProjectExpanded(project.id)">
              chevron_right
            </mat-icon>
          </button>

          <div class="project-label" (click)="openProject(project)">
            <span class="project-dot" [style.background]="project.color"></span>
            <span class="project-name">{{project.name}}</span>
          </div>

          <button class="tree-add-btn"
                  matTooltip="Add folder"
                  (click)="showAddFolder(project.id, $event)">
            <mat-icon>add</mat-icon>
          </button>

        </div>

        <!-- Project Expanded Content -->
        <div class="project-children" *ngIf="isProjectExpanded(project.id)">

          <!-- New Folder Input -->
          <div class="tree-input-row" *ngIf="addingFolderToProject === project.id">
            <mat-icon class="tree-input-icon">folder</mat-icon>
            <input
              [id]="'folder-input-' + project.id"
              class="tree-input"
              type="text"
              placeholder="Folder name..."
              [(ngModel)]="newFolderName"
              (keydown)="onFolderKeydown($event, project.id)"
              (blur)="cancelAddFolder()">
            <button class="tree-confirm-btn" (mousedown)="createFolder(project.id)">
              <mat-icon>check</mat-icon>
            </button>
          </div>

          <!-- Folders -->
          <div class="folder-item" *ngFor="let folder of getFoldersForProject(project.id)">

            <!-- Folder Row -->
            <div class="folder-row" [class.active]="isFolderActive(folder.id)">

              <button class="chevron-btn" (click)="toggleFolder(folder.id)">
                <mat-icon class="chevron-icon" [class.open]="isFolderExpanded(folder.id)">
                  chevron_right
                </mat-icon>
              </button>

              <div class="folder-label" (click)="openFolder(project.id, folder.id)">
                <mat-icon class="folder-icon">folder</mat-icon>
                <span class="folder-name">{{folder.name}}</span>
              </div>

              <button class="tree-add-btn"
                      matTooltip="Add document"
                      (click)="showAddDoc(folder.id, project.id, $event)">
                <mat-icon>add</mat-icon>
              </button>

            </div>

            <!-- Folder Expanded - Documents -->
            <div class="folder-children" *ngIf="isFolderExpanded(folder.id)">

              <!-- New Doc Input -->
              <div class="tree-input-row doc-input-row" *ngIf="addingDocToFolder === folder.id">
                <mat-icon class="tree-input-icon">description</mat-icon>
                <input
                  [id]="'doc-input-' + folder.id"
                  class="tree-input"
                  type="text"
                  placeholder="Doc name..."
                  [(ngModel)]="newDocName"
                  (keydown)="onDocKeydown($event, folder.id, project.id)"
                  (blur)="cancelAddDoc()">
                <button class="tree-confirm-btn" (mousedown)="createDocument(folder.id, project.id)">
                  <mat-icon>check</mat-icon>
                </button>
              </div>

              <!-- Documents -->
              <div class="doc-row-tree"
                   *ngFor="let doc of getDocsForFolder(folder.id)"
                   [class.active]="isDocActive(doc.id)"
                   (click)="openDocument(doc.id)">
                <span class="doc-emoji-tree">{{doc.icon}}</span>
                <span class="doc-name-tree">{{doc.title}}</span>
              </div>

              <!-- Empty -->
              <div class="tree-empty"
                   *ngIf="getDocsForFolder(folder.id).length === 0 && addingDocToFolder !== folder.id">
                No documents
              </div>

            </div>

          </div>

          <!-- No Folders -->
          <div class="tree-empty"
               *ngIf="getFoldersForProject(project.id).length === 0 && addingFolderToProject !== project.id">
            No folders yet
          </div>

        </div>

      </div>

    </div>
    </ng-container>

  </nav>

</div>
