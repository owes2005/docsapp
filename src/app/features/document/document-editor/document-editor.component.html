<div class="editor-container">

  <mat-sidenav-container class="sidenav-container">

    <mat-sidenav 
      mode="side" 
      [opened]="sidebarOpen" 
      class="page-sidenav"
      [style.width.px]="sidebarOpen ? 280 : 0">

      <!-- Sidenav Header -->
      <div class="sidenav-header">
        <button mat-icon-button (click)="backToDocuments()">
          <mat-icon>arrow_back</mat-icon>
        </button>
        <h3>{{document?.title}}</h3>
      </div>

      <!-- Pages Section -->
      <div class="pages-section">
        <div class="pages-header">
          <span>Pages</span>
          <button mat-icon-button (click)="addPage()">
            <mat-icon>add</mat-icon>
          </button>
        </div>

        <div class="pages-list"
             cdkDropList
             (cdkDropListDropped)="dropPage($event)">

          <div class="page-item"
               *ngFor="let page of pages"
               cdkDrag
               [class.active]="selectedPage?.id === page.id"
               (click)="selectPage(page)">

            <mat-icon cdkDragHandle class="drag-handle">drag_indicator</mat-icon>

            <div class="page-info">
              <span class="page-icon">{{page.icon}}</span>
              <span class="page-title">{{page.title}}</span>
            </div>

            <button mat-icon-button
                    class="page-menu-btn"
                    [matMenuTriggerFor]="pageMenu"
                    (click)="$event.stopPropagation()">
              <mat-icon>more_vert</mat-icon>
            </button>

            <mat-menu #pageMenu="matMenu">
              <button mat-menu-item (click)="startRename(page)">
                <mat-icon>edit</mat-icon>
                <span>Rename</span>
              </button>
              <button mat-menu-item (click)="duplicatePage(page)">
                <mat-icon>content_copy</mat-icon>
                <span>Duplicate</span>
              </button>
              <mat-divider></mat-divider>
              <button mat-menu-item (click)="deletePage(page.id)">
                <mat-icon>delete</mat-icon>
                <span>Delete</span>
              </button>
            </mat-menu>

            <div class="rename-overlay" *ngIf="renamingPageId === page.id" (click)="$event.stopPropagation()">
              <input
                id="rename-input"
                type="text"
                [(ngModel)]="renamingPageTitle"
                (blur)="saveRename(page)"
                (keydown)="onRenameKeydown($event, page)">
            </div>

          </div>

        </div>

      </div>

    </mat-sidenav>

    <mat-sidenav-content class="content">
      
      <!-- Toggle Sidebar Button -->
      <button class="sidebar-toggle-btn" 
              (click)="toggleSidebar()"
              [matTooltip]="sidebarOpen ? 'Close sidebar' : 'Open sidebar'">
        <mat-icon>{{sidebarOpen ? 'chevron_left' : 'chevron_right'}}</mat-icon>
      </button>

      <app-block-editor *ngIf="selectedPage" [page]="selectedPage"></app-block-editor>
      
    </mat-sidenav-content>

  </mat-sidenav-container>

</div>
