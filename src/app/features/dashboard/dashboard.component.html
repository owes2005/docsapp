<div class="dashboard">

  <div class="dashboard-header">
    <h2 class="dashboard-title">Projects</h2>
  </div>

  <div class="projects-list">

    <div class="project-item" *ngFor="let project of projects">

      <!-- Project Row -->
      <div class="project-row">

        <!-- Chevron (expand/collapse) -->
        <button class="chevron-btn" (click)="toggleProject(project.id)">
          <mat-icon class="chevron" [class.expanded]="isProjectExpanded(project.id)">
            chevron_right
          </mat-icon>
        </button>

        <!-- Project Name (click to open project page) -->
        <div class="project-main" (click)="openProject(project, $event)">
          <div class="project-icon" [style.background]="project.color">
            {{project.icon}}
          </div>
          <span class="project-name">{{project.name}}</span>
        </div>

        <!-- Add Folder Button -->
        <button class="add-btn"
                matTooltip="Add folder"
                (click)="showAddFolder(project.id, $event)">
          <mat-icon>create_new_folder</mat-icon>
        </button>

      </div>

      <!-- Project Content -->
      <div class="project-content" *ngIf="isProjectExpanded(project.id)">

        <!-- Add Folder Input -->
        <div class="add-folder-row" *ngIf="addingFolderToProject === project.id">
          <mat-icon class="input-icon">folder</mat-icon>
          <input
            [id]="'folder-input-' + project.id"
            class="inline-input"
            type="text"
            placeholder="Folder name..."
            [(ngModel)]="newFolderName"
            (keydown)="onFolderKeydown($event, project.id)"
            (blur)="cancelAddFolder()">
          <button class="confirm-btn" (mousedown)="createFolder(project.id)">
            <mat-icon>check</mat-icon>
          </button>
        </div>

        <!-- Folders -->
        <div class="folder-item"
             *ngFor="let folder of getFoldersForProject(project.id)">

          <!-- Folder Row -->
          <div class="folder-row">

            <button class="chevron-btn" (click)="toggleFolder(folder.id)">
              <mat-icon class="chevron" [class.expanded]="isFolderExpanded(folder.id)">
                chevron_right
              </mat-icon>
            </button>

            <div class="folder-main" (click)="toggleFolder(folder.id)">
              <mat-icon class="folder-icon-sm">folder</mat-icon>
              <span class="folder-name">{{folder.name}}</span>
            </div>

            <button class="add-btn"
                    matTooltip="Add document"
                    (click)="showAddDoc(folder.id, $event)">
              <mat-icon>note_add</mat-icon>
            </button>

            <button class="add-btn danger"
                    matTooltip="Delete folder"
                    (click)="deleteFolder(folder.id, $event)">
              <mat-icon>delete</mat-icon>
            </button>

          </div>

          <!-- Folder Content -->
          <div class="folder-content" *ngIf="isFolderExpanded(folder.id)">

            <!-- Add Doc Input -->
            <div class="add-doc-row" *ngIf="addingDocToFolder === folder.id">
              <mat-icon class="input-icon">description</mat-icon>
              <input
                [id]="'doc-input-' + folder.id"
                class="inline-input"
                type="text"
                placeholder="Document name..."
                [(ngModel)]="newDocName"
                (keydown)="onDocKeydown($event, folder.id, project.id)"
                (blur)="cancelAddDoc()">
              <button class="confirm-btn" (mousedown)="createDocument(folder.id, project.id)">
                <mat-icon>check</mat-icon>
              </button>
            </div>

            <!-- Documents -->
            <div class="doc-item"
                 *ngFor="let doc of getDocsForFolder(folder.id)"
                 (click)="openDocument(doc.id)">
              <span class="doc-emoji">{{doc.icon}}</span>
              <span class="doc-name">{{doc.title}}</span>
              <button class="add-btn danger doc-delete"
                      matTooltip="Delete"
                      (click)="deleteDocument(doc.id, $event)">
                <mat-icon>delete</mat-icon>
              </button>
            </div>

            <!-- Empty -->
            <div class="empty-msg"
                 *ngIf="getDocsForFolder(folder.id).length === 0 && addingDocToFolder !== folder.id">
              No documents yet
            </div>

          </div>

        </div>

        <!-- No Folders -->
        <div class="empty-msg"
             *ngIf="getFoldersForProject(project.id).length === 0 && addingFolderToProject !== project.id">
          No folders yet
        </div>

      </div>

    </div>

  </div>

</div>
